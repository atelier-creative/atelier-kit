<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chia sẻ tài liệu</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
      border: 1px solid #f0f0f0;
    }

    .share-btn {
      background: #c9302c;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(201, 48, 44, 0.3);
      letter-spacing: 0.5px;
    }

    .share-btn:hover {
      background: #a02622;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(201, 48, 44, 0.4);
    }

    .share-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(201, 48, 44, 0.3);
    }

    .share-btn:disabled {
      background: #ddd;
      cursor: not-allowed;
      box-shadow: none;
      color: #999;
    }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      border-left: 4px solid;
      text-align: left;
    }

    .message.success {
      background: #f0f9f4;
      color: #1e7e34;
      border-left-color: #28a745;
      display: block;
    }

    .message.error {
      background: #fef5f5;
      color: #c9302c;
      border-left-color: #c9302c;
      display: block;
    }

    .message.info {
      background: #fefaf0;
      color: #856404;
      border-left-color: #ffc107;
      display: block;
    }

    .preview-text {
      margin-top: 16px;
      padding: 12px 14px;
      background: #f8f9fa;
      border: 1px dashed #ccc;
      border-radius: 8px;
      font-size: 14px;
      text-align: left;
      white-space: pre-wrap;
      color: #333;
    }

    .share-options {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .toggle-option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-option input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #c9302c;
    }

    .toggle-option label {
      cursor: pointer;
      font-size: 16px;
      color: #333;
    }

    .toggle-option input[type="checkbox"]:disabled + label {
      color: #999;
      cursor: not-allowed;
    }

    /* Document list */
    .doc-list-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      text-align: left;
    }

    .doc-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
      text-align: left;
    }

    .doc-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      background: #fafafa;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .doc-card:hover {
      background: #f3f3f3;
    }

    .doc-card.selected {
      border-color: #c9302c;
      background: #fff8f8;
    }

    .doc-card input[type="checkbox"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      accent-color: #c9302c;
    }

    .doc-thumb {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #eee;
      background: #f0f0f0;
      flex-shrink: 0;
    }

    .doc-thumb-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      border: 1px solid #eee;
      background: #f0f0f0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .doc-info {
      flex: 1;
      min-width: 0;
    }

    .doc-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .doc-type-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.3px;
    }

    .doc-type-badge.pdf {
      background: #fff3e0;
      color: #e65100;
    }

    .doc-type-badge.image {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .doc-type-badge.unknown {
      background: #eeeeee;
      color: #555;
    }

    .doc-title {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      word-break: break-word;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .doc-note {
      font-size: 12px;
      color: #666;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #c9302c;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #999; letter-spacing: .3px; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Đang tải...</div>
</div>

<div class="container">
  <div class="share-options">
    <div class="toggle-option">
      <input type="checkbox" id="toggleText" checked>
      <label for="toggleText">Include Text</label>
    </div>
    <div class="toggle-option">
      <input type="checkbox" id="toggleDocs" checked>
      <label for="toggleDocs">Include Documents</label>
    </div>
  </div>

  <div id="docListWrap" style="display:none;">
    <div class="doc-list-label">Tài liệu</div>
    <div class="doc-list" id="docList"></div>
  </div>

  <button id="shareBtn" class="share-btn">Chia sẻ</button>
  <div id="message" class="message"></div>
  <div id="previewText" class="preview-text" style="display:none;"></div>
</div>

<script>
  const shareBtn = document.getElementById('shareBtn');
  const messageDiv = document.getElementById('message');

  if (!navigator.share) {
    shareBtn.disabled = true;
    showMessage('Native sharing is not supported on this device/browser', 'error');
  }

  // --- URL param helpers ---

  function getMessageFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const m = params.get('m');
    if (!m) return '';
    try {
      return decodeURIComponent(m);
    } catch {
      return decodeURIComponent(m.replace(/%(?![0-9A-Fa-f]{2})/g, '%25'));
    }
  }

  // Parse q param: entries are pipe-separated fields in groups of 5
  // Format: Title|Document|Image|Type|Note  (repeated, no comma between entries)
  // Commas inside field values are URL-encoded as %2C by AppSheet, so after
  // URLSearchParams.get('q') decodes them they become literal commas — but since
  // we split by '|' (pipe), not comma, this is fine.
  function parseDocuments() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (!q) return [];

    const parts = q.split('|');
    const docs = [];
    for (let i = 0; i < parts.length; i += 5) {
      const title       = (parts[i]   || '').trim();
      const docPath     = (parts[i+1] || '').trim();
      const imagePath   = (parts[i+2] || '').trim();
      const type        = (parts[i+3] || '').trim();
      const note        = (parts[i+4] || '').trim();
      if (title || docPath || imagePath || type) {
        docs.push({ title, docPath, imagePath, type, note });
      }
    }
    return docs;
  }

  // document and image params contain AppSheet URLs with raw (unencoded) & inside,
  // so URLSearchParams.get() would truncate at the first &. Use scan-forward instead.
  // Known top-level params used as stop boundaries.
  const KNOWN_TOP_PARAMS = ['&document=', '&image=', '&q=', '&v=', '&m='];

  function getRawParam(paramName) {
    const href = window.location.href;
    const key = '&' + paramName + '=';
    const key0 = '?' + paramName + '=';
    let start = -1;
    const i0 = href.indexOf(key0);
    const i1 = href.indexOf(key);
    if (i0 !== -1) start = i0 + key0.length;
    else if (i1 !== -1) start = i1 + key.length;
    if (start === -1) return '';

    const stopKey = '&' + paramName + '=';
    const stops = KNOWN_TOP_PARAMS
      .filter(s => s !== stopKey)
      .map(s => href.indexOf(s, start))
      .filter(i => i !== -1);
    const end = stops.length ? Math.min(...stops) : href.length;
    return href.substring(start, end);
  }

  // document param: comma-separated full AppSheet document URLs per entry
  function getDocumentUrls() {
    const raw = getRawParam('document');
    if (!raw) return [];
    return raw.split(',').map(u => u.trim());
  }

  // image param: comma-separated full AppSheet image URLs per entry
  function getImageUrls() {
    const raw = getRawParam('image');
    if (!raw) return [];
    return raw.split(',').map(u => u.trim());
  }

  // --- Fetch helpers ---

  async function fetchAsFile(url, fallbackName) {
    let fetchUrl = url;
    try { fetchUrl = decodeURIComponent(url); } catch { /* keep original */ }
    const response = await fetch(fetchUrl, { mode: 'cors', cache: 'no-cache', credentials: 'omit' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const blob = await response.blob();
    if (blob.size === 0) throw new Error('Empty file');

    let filename = fallbackName;
    try {
      const urlObj = new URL(url);
      const fileNameParam = urlObj.searchParams.get('fileName');
      if (fileNameParam) {
        const parts = fileNameParam.split('/');
        filename = decodeURIComponent(parts[parts.length - 1]);
      } else {
        const pathParts = urlObj.pathname.split('/');
        const last = pathParts[pathParts.length - 1];
        if (last) filename = decodeURIComponent(last);
      }
    } catch { /* keep fallbackName */ }

    let fileType = blob.type;
    if (!fileType || fileType === 'application/octet-stream') {
      const ext = filename.split('.').pop().toLowerCase();
      const mimeTypes = {
        jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png',
        gif: 'image/gif', webp: 'image/webp', pdf: 'application/pdf'
      };
      fileType = mimeTypes[ext] || 'application/octet-stream';
    }

    return new File([blob], filename, { type: fileType });
  }

  // --- Render ---

  function renderPreviewMessage() {
    const previewEl = document.getElementById('previewText');
    const text = getMessageFromQuery();
    if (text) {
      previewEl.textContent = text;
      previewEl.style.display = 'block';
    } else {
      previewEl.style.display = 'none';
    }
  }

  function typeBadgeClass(type) {
    const t = (type || '').toUpperCase();
    if (t === 'PDF') return 'pdf';
    if (t.includes('HÌNH') || t.includes('HINH') || t.includes('IMAGE')) return 'image';
    return 'unknown';
  }

  function typeIcon(type) {
    const t = (type || '').toUpperCase();
    if (t === 'PDF') return '📄';
    return '🖼️';
  }

  async function renderDocList() {
    const docs = parseDocuments();
    const imageUrls = getImageUrls();
    const wrap = document.getElementById('docListWrap');
    const list = document.getElementById('docList');

    if (!docs.length) return;
    wrap.style.display = 'block';

    for (let i = 0; i < docs.length; i++) {
      const doc = docs[i];
      const fullImageUrl = imageUrls[i] || '';

      const card = document.createElement('div');
      card.className = 'doc-card selected';

      // Checkbox
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = true;
      cb.dataset.index = i;
      cb.addEventListener('change', () => card.classList.toggle('selected', cb.checked));

      // Thumbnail: set src directly so the browser loads it as an image (avoids CORS
      // preflight that would be triggered by fetch()). Falls back to icon on error.
      let thumbEl;
      if (fullImageUrl) {
        thumbEl = document.createElement('img');
        thumbEl.className = 'doc-thumb';
        thumbEl.alt = doc.title;
        thumbEl.onerror = () => {
          const placeholder = document.createElement('div');
          placeholder.className = 'doc-thumb-placeholder';
          placeholder.textContent = typeIcon(doc.type);
          thumbEl.replaceWith(placeholder);
        };
        thumbEl.src = fullImageUrl;
      } else {
        thumbEl = document.createElement('div');
        thumbEl.className = 'doc-thumb-placeholder';
        thumbEl.textContent = typeIcon(doc.type);
      }

      // Info section
      const info = document.createElement('div');
      info.className = 'doc-info';

      if (doc.type) {
        const badges = document.createElement('div');
        badges.className = 'doc-badges';
        const badge = document.createElement('span');
        badge.className = `doc-type-badge ${typeBadgeClass(doc.type)}`;
        badge.textContent = doc.type;
        badges.appendChild(badge);
        info.appendChild(badges);
      }

      const titleEl = document.createElement('div');
      titleEl.className = 'doc-title';
      // Show title, or fall back to filename from path
      const displayTitle = doc.title ||
        (doc.docPath || doc.imagePath).split('/').pop() || `Tài liệu ${i + 1}`;
      titleEl.textContent = displayTitle;
      info.appendChild(titleEl);

      if (doc.note) {
        const noteEl = document.createElement('div');
        noteEl.className = 'doc-note';
        noteEl.textContent = doc.note;
        info.appendChild(noteEl);
      }

      // Click card body to toggle checkbox
      card.addEventListener('click', (e) => {
        if (e.target !== cb) {
          cb.checked = !cb.checked;
          card.classList.toggle('selected', cb.checked);
        }
      });

      card.appendChild(cb);
      card.appendChild(thumbEl);
      card.appendChild(info);
      list.appendChild(card);
    }
  }

  // --- Share ---

  shareBtn.addEventListener('click', async () => {
    try {
      const includeText = document.getElementById('toggleText').checked;
      const includeDocs = document.getElementById('toggleDocs').checked;

      if (!includeText && !includeDocs) {
        showMessage('Please select at least one option to share', 'error');
        return;
      }

      const shareData = {};
      const itemsToShare = [];

      const docs = parseDocuments();
      const checkboxes = document.querySelectorAll('#docList input[type="checkbox"]');
      const selectedIndices = Array.from(checkboxes)
        .map((cb, i) => cb.checked ? i : -1)
        .filter(i => i !== -1);

      if (includeText) {
        const parts = [];
        const m = getMessageFromQuery();
        if (m) parts.push(m);
        for (const i of selectedIndices) {
          const doc = docs[i];
          const lines = [];
          if (doc.title) lines.push(doc.title);
          if (doc.note) lines.push(doc.note);
          if (lines.length) parts.push(lines.join('\n'));
        }
        if (parts.length) {
          shareData.text = parts.join('\n\n');
          itemsToShare.push('text');
        }
      }

      if (includeDocs) {
        const documentUrls = getDocumentUrls();
        const imageUrls = getImageUrls();

        if (selectedIndices.length > 0) {
          showMessage(`Đang tải ${selectedIndices.length} tài liệu...`, 'info');
          const files = [];

          for (const i of selectedIndices) {
            const doc = docs[i];
            const isPdf = (doc.type || '').toUpperCase() === 'PDF';

            // Use full URL from document/image params based on type
            const fullUrl = isPdf
              ? (documentUrls[i] || imageUrls[i] || '')
              : (imageUrls[i] || documentUrls[i] || '');

            if (!fullUrl) {
              console.warn(`No URL available for entry ${i} ("${doc.title}")`);
              continue;
            }

            const fallbackName = (doc.title || `doc-${i + 1}`) +
              (isPdf ? '.pdf' : '.jpg');

            try {
              const file = await fetchAsFile(fullUrl, fallbackName);
              files.push(file);
            } catch (err) {
              const label = doc.title || `Tài liệu ${i + 1}`;
              showMessage(`Lỗi khi tải "${label}": ${err.message}`, 'error');
              return;
            }
          }

          if (files.length > 0) {
            shareData.files = files;
            itemsToShare.push(`${files.length} tài liệu`);
          }
        }
      }

      if (!shareData.text && !shareData.files) {
        showMessage('Không có nội dung để chia sẻ', 'error');
        return;
      }

      if (navigator.canShare && !navigator.canShare(shareData)) {
        showMessage('Trình duyệt không thể chia sẻ nội dung này', 'error');
        return;
      }

      shareData.title = '';
      await navigator.share(shareData);
      showMessage(`Đã chia sẻ ${itemsToShare.join(' + ')} thành công!`, 'success');
    } catch (error) {
      if (error.name === 'AbortError') {
        showMessage('Đã huỷ chia sẻ', 'info');
      } else {
        showMessage('Lỗi: ' + error.message, 'error');
        console.error('Share error:', error);
      }
    }
  });

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'message ' + type;
    if (type === 'success' || type === 'info') {
      setTimeout(() => { messageDiv.className = 'message'; }, 3000);
    }
  }

  function updateToggleStates() {
    const toggleText = document.getElementById('toggleText');
    const toggleDocs = document.getElementById('toggleDocs');
    const docs = parseDocuments();
    const hasText = !!getMessageFromQuery() || docs.some(d => d.title || d.note);
    if (!hasText) {
      toggleText.disabled = true;
      toggleText.checked = false;
    }
    if (!docs.length) {
      toggleDocs.disabled = true;
      toggleDocs.checked = false;
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    updateToggleStates();
    renderPreviewMessage();

    const docs = parseDocuments();
    if (docs.length > 0) {
      showMessage(`${docs.length} tài liệu sẵn sàng`, 'info');
    } else if (getMessageFromQuery()) {
      showMessage('Sẵn sàng chia sẻ văn bản', 'info');
    } else {
      showMessage('Thêm nội dung qua tham số URL: ?q=... hoặc ?m=...', 'info');
    }

    renderDocList().finally(() => {
      document.getElementById('loadingOverlay').classList.add('hidden');
    });
  });
</script>
</body>
</html>
